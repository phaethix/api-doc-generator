services:
  api-doc-generator:
    build:
      context: .
      dockerfile: Dockerfile
    image: api-doc-generator:latest
    container_name: api-doc-generator
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DENO_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
