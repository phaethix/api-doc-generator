services:
  api-doc-generator:
    build:
      context: .
      dockerfile: Dockerfile
    image: api-doc-generator:latest
    container_name: api-doc-generator
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - DENO_ENV=production
      - LOG_LEVEL=info
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://apihub.agnes-ai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-agnes-2.0-flash}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "deno", "eval", "try { const r = await fetch('http://localhost:8080/health'); Deno.exit(r.status === 200 ? 0 : 1); } catch { Deno.exit(1); }"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
